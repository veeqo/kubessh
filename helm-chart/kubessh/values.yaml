# Required to run
hostKey:

# Log level for the server container. Accepts 'INFO' or 'DEBUG'.
logLevel: INFO

# Grace period in seconds before a user pod is force-killed after SSH disconnect.
deleteGracePeriod: 60

replicaCount: 1

image:
  repository: yuvipanda/kubessh-kubessh
  tag: set-by-chartpress
  pullPolicy: Always

  name: yuvipanda/kubessh-kubessh
service:
  type: LoadBalancer
  port: 22
  nodePort: 32222

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

rbac:
  enabled: true

auth:
  type: github
  github:
    allowedUsers: []
    allowedTeams: []
    # A GitHub personal access token with read:org scope.
    # Required when allowedTeams is set.
    token: ""
